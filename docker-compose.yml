services:
  liverun:
    build: .
    image: ghcr.io/aaron9589/liverun:latest
    container_name: liverun
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - liverun-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Set BASE_PATH if serving under a sub-path e.g. /liverun
      # Leave unset (or empty) for root / subdomain deployments
      # - BASE_PATH=/liverun

volumes:
  liverun-data:
